[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["../tests/backend"]
# Use importlib mode so the tests/backend package does not shadow the real
# `backend` application package on sys.path (conftest handles path setup).
addopts = "--import-mode=importlib"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false
