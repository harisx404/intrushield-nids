version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: nids-backend
    restart: always
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///backend/database/nids.db
      - JWT_SECRET_KEY=dev-secret-key
      - APP_ENV=development
    volumes:
      - ./backend:/app/backend
      - ./suricata/logs:/var/log/suricata
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: nids-frontend
    restart: always
    ports:
      - "3000:3000"

  suricata:
    build:
      context: .
      dockerfile: docker/Dockerfile.suricata
    container_name: nids-suricata
    network_mode: "host"
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    volumes:
      - ./suricata/logs:/var/log/suricata
      - ./suricata/rules:/etc/suricata/rules
      - ./suricata/config/suricata.yaml:/etc/suricata/suricata.yaml

  nginx:
    image: nginx:alpine
    container_name: nids-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
