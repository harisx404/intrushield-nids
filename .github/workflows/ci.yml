name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-backend:
    name: Lint Python Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linting tools
        run: pip install ruff black mypy
      - name: Run Ruff
        run: ruff check backend/
      - name: Run Black check
        run: black --check backend/
      - name: Run mypy
        run: mypy backend/ --ignore-missing-imports
        continue-on-error: true  # Non-blocking for now

  test-backend:
    name: Test Python Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Create test .env
        run: |
          echo "JWT_SECRET_KEY=test-secret-key-for-ci-only-64-chars-minimum-length" > backend/.env
          echo "DATABASE_URL=sqlite+aiosqlite:///:memory:" >> backend/.env
          echo "APP_ENV=testing" >> backend/.env
          echo "SURICATA_LOG_PATH=/tmp/eve.json" >> backend/.env
          echo "GEOIP_DB_PATH=/tmp/GeoLite2-City.mmdb" >> backend/.env
          echo "CORS_ORIGINS=http://localhost:3000" >> backend/.env
      - name: Run tests
        run: pytest tests/backend/ -v --cov=backend --cov-report=xml
        working-directory: .
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  lint-frontend:
    name: Lint TypeScript Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend
      - name: ESLint check
        run: npx eslint . --max-warnings 0
        working-directory: frontend
        continue-on-error: true  # Non-blocking for now

  test-frontend:
    name: Test TypeScript Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run Jest tests
        run: npm test -- --ci
        working-directory: frontend

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t nids-backend .
      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t nids-frontend .
